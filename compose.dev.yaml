name: olympsis-dev

volumes:
    mongo-data:
    redis-data:

secrets:
    key-file:
        file: ./files/localhost.key
    cert-file:
        file: ./files/localhost.crt
    apns-key:
        file: ./files/AuthKey_5PR7XV2XXL.p8
    firebase-token:
        file: ./files/firebase-credentials.json
    apple_key_id:
        environment: APPLE_KEY_ID
    apple_team_id:
        environment: APPLE_TEAM_ID
    mapkit_token:
        environment: MAPKIT_TOKEN

services:
    gateway:
        container_name: gateway
        image: apache/apisix
        restart: always
        volumes:
            - ./files/apisix.yaml:/usr/local/apisix/conf/config.yaml:ro
            - ./files/apisix-routes.yaml:/usr/local/apisix/conf/apisix.yaml:ro
        ports:
            - 9080:9080
    server:
        build:
            context: .
            # DEV ONLY: expose the local models module (referenced by the
            # `replace => ../models` in go.mod) as a named build context so the
            # Dockerfile can copy it into the image. Remove alongside the replace
            # directive when cutting a production build.
            additional_contexts:
                models: ../models
            no_cache: true
        container_name: server
        restart: always
        ports:
            - 80:80
        volumes:
            - ./files/firebase-credentials.json:/app/firebase-credentials.json:ro
            - ./files/storage-credentials.json:/app/storage-credentials.json:ro
            - ./files/localhost.key:/app/localhost.key:ro
            - ./files/localhost.crt:/app/localhost.crt:ro
            - ./files/AuthKey_5PR7XV2XXL.p8:/app/AuthKey_5PR7XV2XXL.p8:ro
            - ./files/AuthKey_FQ38XX3HXG.p8:/app/AuthKey_FQ38XX3HXG.p8:ro
        env_file: .env.dev
        depends_on:
            - gateway
            - mongo
            - redis

    mongo:
        container_name: mongo
        image: mongo
        restart: always
        environment:
            MONGO_INITDB_ROOT_USERNAME: admin
            MONGO_INITDB_ROOT_PASSWORD: olympsis
        ports:
            - 27017:27017
        volumes:
            - mongo-data:/data/db

    redis:
        container_name: redis
        image: redis
        restart: always
        ports:
            - 6379:6379
        volumes:
            - redis-data:/data