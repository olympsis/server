services:
    nginx:
        image: nginx:alpine
        ports:
            - "80:80"
        networks:
            - backend
        links:
            - "server"
            - "storage"
            - "notif"
            - "chat"
        volumes:
            - /etc/olympsis/nginx/server.conf:/etc/nginx/conf.d/default.conf:ro
            - /etc/olympsis/nginx/proxy_headers.conf:/etc/nginx/proxy_headers.conf:ro
        depends_on:
            - server
            
    server:
        container_name: server
        image: us-central1-docker.pkg.dev/olympsis-408521/main/server:v0.7.0
        restart: always
        pull_policy: always
        ports:
            - 8080:80
        networks:
            - backend
        volumes:
            # - db-data:/server
            - /etc/olympsis/firebase-credentials.json:/app/firebase-credentials.json:ro
        environment:
            MODE: PRODUCTION
            NOTIF_URL: http://notif
            STORAGE_URL: http://storage
            FIREBASE_FILE_PATH: ./firebase-credentials.json
            MAPKIT_TOKEN: eyJraWQiOiI3NjZXUjMyNVM4IiwidHlwIjoiSldUIiwiYWxnIjoiRVMyNTYifQ.eyJpc3MiOiI1QTZINDlRODVEIiwiaWF0IjoxNzQwMjg0NjQ1LCJleHAiOjE3NDA5MDIzOTl9.LPQlwicCot1AmWF8utQclYB2XCoN5C4oeOQyDmo-SlAGP_zWVpExAbcQGyEl6NvnWtLIM1cVLpGLcln9DxrZNw

    storage:
        container_name: storage
        image: us-central1-docker.pkg.dev/olympsis-408521/main/storage:v0.3.0
        restart: always
        pull_policy: always
        ports:
            - 8081:80
        networks:
            - backend
        volumes:
            - /etc/olympsis/firebase-credentials.json:/app/firebase-credentials.json:ro
        environment:
            FIREBASE_FILE_PATH: ./firebase-credentials.json


    notif:
        container_name: notif
        image: us-central1-docker.pkg.dev/olympsis-408521/main/notif:v0.6.2
        restart: always
        pull_policy: always
        ports:
            - 8082:80
        networks:
            - backend
        volumes:
            - /etc/olympsis/AuthKey_5MP3VW78BZ.p8:/app/AuthKey_5MP3VW78BZ.p8:ro
            - /etc/olympsis/firebase-credentials.json:/app/firebase-credentials.json:ro
        environment:
            KEY_ID: 5MP3VW78BZ
            TEAM_ID: 5A6H49Q85D
            APNS_KEY_URL: ./AuthKey_5MP3VW78BZ.p8
            FIREBASE_FILE_PATH: ./firebase-credentials.json

