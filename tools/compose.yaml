name: olympsis-prod

volumes:
    db-data:

services:
    nginx:
        image: nginx:alpine
        ports:
            - "80:80"
        volumes:
            - ./nginx:/etc/nginx/conf.d

    server:
        container_name: server
        image: us-central1-docker.pkg.dev/olympsis-408521/main/server:latest
        restart: always
        pull_policy: always
        ports:
