server {
    listen 80;
    server_name api.olympsis.com;

    set $server_location http://server:80;

    location /v1/health {
        proxy_pass $server_location;
        include proxy_headers.conf;
    }

    location /v1/auth {
        proxy_pass $server_location;
        include proxy_headers.conf;
    }

    location /v1/users {
        proxy_pass $server_location;
