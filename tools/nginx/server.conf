        include proxy_headers.conf;
    }

    location /v1/events {
        proxy_pass $server_location;
        include proxy_headers.conf;
    }

    location /v1/clubs {
        proxy_pass $server_location;
        include proxy_headers.conf;
    }

    location /v1/organizations {
        proxy_pass $server_location;
        include proxy_headers.conf;
    }

    location /v1/posts {
        proxy_pass $server_location;
        include proxy_headers.conf;
    }

    location /v1/reports {
        proxy_pass $server_location;
        include proxy_headers.conf;
    }

    location /v1/locales {
        proxy_pass $server_location;
        include proxy_headers.conf;
