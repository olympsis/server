version: "3"

services:
  apisix:
    container_name: apisix
    image: "apache/apisix:3.4.1-debian"
    restart: always
    volumes:
      - ./conf/apisix-conf.yaml:/usr/local/apisix/conf/config.yaml:ro
    depends_on:
      - etcd
    ports:
      - "9180:9180/tcp"
      - "9080:9080/tcp"
      - "9091:9091/tcp"
      - "9443:9443/tcp"
    networks:
      - olympsis

  dashboard:
    container_name: dashboard
    image: "apache/apisix-dashboard:3.0.1-centos"
    restart: always
    volumes:
      - ./conf/dashboard-conf.yaml:/usr/local/apisix-dashboard/conf/conf.yaml:ro
    depends_on:
      - etcd
    ports:
      - "9000:9000/tcp"
    networks:
      - olympsis

  etcd:
    container_name: etcd
    image: bitnami/etcd:3.4.9
    user: root
    restart: always
    volumes:
      - ./etcd_data:/etcd_data
    environment:
      ETCD_DATA_DIR: /etcd_data
      ETCD_ENABLE_V2: "true"
      ALLOW_NONE_AUTHENTICATION: "yes"
      ETCD_ADVERTISE_CLIENT_URLS: "http://etcd:2379"
      ETCD_LISTEN_CLIENT_URLS: "http://0.0.0.0:2379"
    ports:
      - "2379:2379/tcp"
    networks:
      - olympsis

# OLYMPSIS SERVICES

  master:
    container_name: master
    image: olympsis/server:0.2.4
    restart: always
    ports:
      - "8080:8080/tcp"
    depends_on:
      - apisix
      - dashboard
      - etcd
    networks:
      olympsis:
        ipv4_address: 172.20.0.5

  chat:
    container_name: chat
    image: olympsis/chat:v0.1.5
    restart: always
    ports:
      - "8081:8081/tcp"
    depends_on:
      - apisix
      - dashboard
      - etcd
    networks:
      olympsis:
        ipv4_address: 172.20.0.6

  storage:
    container_name: storage
    image: olympsis/storage:v0.1.1
    restart: always
    ports:
      - "8082:8082/tcp"
    depends_on:
      - apisix
      - dashboard
      - etcd
    networks:
      olympsis:
        ipv4_address: 172.20.0.7

networks:
  olympsis:
    name: olympsis
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: "172.20.0.0/16"
        - gateway: "172.20.0.1"
