version: "3.0"

volumes:
    mongo-data:
        external: true
    redis-data:
        external: true

services:
    gateway:
        container_name: gateway
        image: apache/apisix
        restart: always
        volumes:
            - ./apisix.yaml:/usr/local/apisix/conf/config.yaml:ro
            - ./apisix-routes.yaml:/usr/local/apisix/conf/apisix.yaml:ro
        networks:
            - olympsis
        ports:
            - 9080:9080
            
    server:
        container_name: server
        image: us-central1-docker.pkg.dev/olympsis-485522/server/release:v0.8.1
        restart: always
        pull_policy: always
        ports:
            - 8080:80
        networks:
            - olympsis
        volumes:
            - ./AuthKey_PWK5QB5Z6R.p8:/app/AuthKey_PWK5QB5Z6R.p8:ro
            - ./firebase-credentials.json:/app/firebase-credentials.json:ro
        env_file: .env.prod

    storage:
        container_name: storage
        image: us-central1-docker.pkg.dev/olympsis-485522/storage/release:v0.3.0
        restart: always
        pull_policy: always
        ports:
            - 8081:80
        networks:
            - olympsis
        volumes:
            - ./firebase-credentials.json:/app/firebase-credentials.json:ro
            - ./storage-credentials.json:/app/storage-credentials.json:ro
        env_file: .env.prod

    client-web:
        container_name: client-web
        image: us-central1-docker.pkg.dev/olympsis-485522/client-web/release:v0.1.0
        restart: always
        pull_policy: always
        ports:
            - 3000:80
        networks:
            - olympsis

    # chat:
    #     container_name: chat
    #     image: us-central1-docker.pkg.dev/olympsis-408521/main/chat:v1.0.0
    #     restart: always
    #     pull_policy: always
    #     ports:
    #         - 8082:7003

    # Telegram/Discord "bot father". Posts event reminders into linked club chats and
    # parses replies into RSVPs via the Claude API. Build/push from ../bots (see
    # bots/Dockerfile) and point SERVER_URL/INTERNAL_SECRET at the server above.
    bots:
        container_name: bots
        image: us-central1-docker.pkg.dev/olympsis-485522/bots/release:v0.1.0
        restart: always
        pull_policy: always
        ports:
            - 8082:80
        networks:
            - olympsis
        environment:
            MODE: PRODUCTION
            PORT: "80"
            MONGO_ADDRESS: mongodb://admin:olympsis@mongo:27017/?retryWrites=true&w=majority
            DATABASE_NAME: olympsis
            SERVER_URL: http://server:80
            # INTERNAL_SECRET must match the server's INTERNAL_SECRET (set in .env.prod)
            INTERNAL_SECRET: ${INTERNAL_SECRET}
            TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
            DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN}
            DISCORD_APP_ID: ${DISCORD_APP_ID}
            ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
            ANTHROPIC_MODEL: claude-haiku-4-5-20251001
        depends_on:
            - server
            - mongo

    mongo:
        container_name: mongo
        image: mongo
        restart: always
        networks:
            - olympsis
        environment:
            MONGO_INITDB_ROOT_USERNAME: admin
            MONGO_INITDB_ROOT_PASSWORD: olympsis
        ports:
            - 27017:27017
        volumes:
            - mongo-data:/data/db

    redis:
        container_name: redis
        image: redis
        restart: always
        networks:
            - olympsis
        ports:
            - 6379:6379
        volumes:
            - redis-data:/data

networks:
    olympsis:
        driver: bridge