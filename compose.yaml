version: "3.0"

volumes:
    db-data:

services:
    nginx:
        image: nginx:alpine
        ports:
            - "80:80"
        networks:
            - backend
        links:
            - "server"
            - "storage"
            # - "chat"
        volumes:
            - /etc/olympsis/nginx/server.conf:/etc/nginx/conf.d/default.conf:ro
            - /etc/olympsis/nginx/proxy_headers.conf:/etc/nginx/proxy_headers.conf:ro
        depends_on:
            - server
            
    server:
        container_name: server
        image: us-central1-docker.pkg.dev/olympsis-485522/server/release:v0.8.1
        restart: always
        pull_policy: always
        ports:
            - 8080:80
        networks:
            - backend
        volumes:
            - db-data:/server
            - /etc/olympsis/AuthKey_FDZ85P3KX3.p8:/app/AuthKey_FDZ85P3KX3.p8:ro
            - /etc/olympsis/firebase-credentials.json:/app/firebase-credentials.json:ro
        env_file: .env.prod

    storage:
        container_name: storage
        image: us-central1-docker.pkg.dev/olympsis-408521/main/storage:v0.3.0
        restart: always
        pull_policy: always
        ports:
            - 8081:80
        networks:
            - backend
        volumes:
            - /etc/olympsis/firebase-credentials.json:/app/firebase-credentials.json:ro
        environment:
            FIREBASE_FILE_PATH: ./firebase-credentials.json

    # chat:
    #     container_name: chat
    #     image: us-central1-docker.pkg.dev/olympsis-408521/main/chat:v1.0.0
    #     restart: always
    #     pull_policy: always
    #     ports:
    #         - 8082:7003

networks:
    backend:
        driver: bridge