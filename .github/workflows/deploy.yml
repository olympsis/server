name: Zero Downtime Deploy via IAP

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v1
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Set up gcloud CLI
      uses: google-github-actions/setup-gcloud@v1

    - name: Start server-b
      run: |
        gcloud compute instances start server-b --zone=${{ secrets.GCP_ZONE }}

    - name: Deploy to server-b
      run: |
        gcloud compute ssh ${{ secrets.SSH_USER }}@server-b \
          --zone=${{ secrets.GCP_ZONE }} \
          --tunnel-through-iap \
          --command="cd /home/app && git pull && docker compose pull && docker compose up -d --build"

    - name: Wait for server-b to be healthy in backend
      run: |
        echo "Waiting for server-b to be healthy..."
        for i in {1..30}; do
          STATUS=$(gcloud compute backend-services get-health main-vm \
            --global \
            --format="json" | jq -r \
            '.[] | .status.healthStatus[]? | select(.ipAddress == "${{ secrets.SERVER_B_IP }}) | .healthState')

          echo "Health status: $STATUS"
          if [ "$STATUS" = "HEALTHY" ]; then
            echo "server-b is healthy"
            break
          fi
          sleep 10
        done

    - name: Deploy to server
      run: |
        gcloud compute ssh ${{ secrets.SSH_USER }}@server \
          --zone=${{ secrets.GCP_ZONE }} \
          --tunnel-through-iap \
          --command="cd /home/app && git pull && docker compose pull && docker compose up -d --build"

    - name: Wait for server to be healthy in backend
      run: |
        echo "Waiting for server to be healthy..."
        for i in {1..30}; do
          STATUS=$(gcloud compute backend-services get-health main-vm \
            --global \
            --format="json" | jq -r \
            '.[] | .status.healthStatus[]? | select(.ipAddress == "${{ secrets.SERVER_IP }}) | .healthState')

          echo "Health status: $STATUS"
          if [ "$STATUS" = "HEALTHY" ]; then
            echo "server is healthy"
            break
          fi
          sleep 10
        done

    - name: Stop server-b
      run: |
        gcloud compute instances stop server-b --zone=${{ secrets.GCP_ZONE }}